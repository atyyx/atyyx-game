<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>atyyx ULTRA</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
}

#score { font-size:20px; }
#combo { color:#ff66ff; }

#shop {
  position:absolute;
  top:20px;
  right:20px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:rgba(0,0,0,0.5);
  color:white;
}

#controls {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}
</style>
</head>

<body>

<div id="ui">
  <h2>atyyx 🛴</h2>
  <div id="score">Score: 0</div>
  <div id="combo">Combo: x1</div>
</div>

<div id="shop">
  <button onclick="setColor(0xaa00ff)">🟣</button>
  <button onclick="setColor(0x00ffff)">🔵</button>
  <button onclick="setColor(0xff0000)">🔴</button>
</div>

<div id="controls">
  <button onclick="jump()">⬆️</button>
  <button onclick="tailwhip()">🌀</button>
  <button onclick="barspin()">🔄</button>
  <button onclick="backflip()">↩️</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// 🌇 фон
const loader = new THREE.TextureLoader();
scene.background = loader.load("https://i.imgur.com/8wKQZ5C.jpeg");

// камера
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,6);

// рендер
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// свет
const light = new THREE.PointLight(0xff8844, 2, 50);
light.position.set(0,5,5);
scene.add(light);

// земля
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// рампы
for(let i=5;i<100;i+=10){
  const ramp = new THREE.Mesh(
    new THREE.BoxGeometry(4,1,2),
    new THREE.MeshStandardMaterial({ color:0x555555 })
  );
  ramp.position.set(i,0.5,0);
  ramp.rotation.z = -0.5;
  scene.add(ramp);
}

// 🛴 самокат
const scooter = new THREE.Group();

const deckMaterial = new THREE.MeshStandardMaterial({ color:0xaa00ff, emissive:0x220022 });

const deck = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.1,0.3),
  deckMaterial
);
scooter.add(deck);

const bar = new THREE.Mesh(
  new THREE.BoxGeometry(0.1,1,0.1),
  new THREE.MeshStandardMaterial({ color:0x000000 })
);
bar.position.y = 0.5;
scooter.add(bar);

scene.add(scooter);

// физика
let velocityY = 0;
let jumping = false;

// очки
let score = 0;
let combo = 1;

// функции
function jump(){
  if(!jumping){
    velocityY = 0.3;
    jumping = true;
  }
}

function tailwhip(){
  if(jumping){
    scooter.rotation.y += Math.PI*2;
    addScore(100);
    glow();
  }
}

function barspin(){
  if(jumping){
    scooter.rotation.x += Math.PI*2;
    addScore(120);
    glow();
  }
}

function backflip(){
  if(jumping){
    scooter.rotation.z += Math.PI*2;
    addScore(150);
    glow();
  }
}

function addScore(points){
  combo += 0.3;
  score += Math.floor(points * combo);
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("combo").innerText = "Combo: x" + combo.toFixed(1);
}

// цвет
function setColor(c){
  deckMaterial.color.setHex(c);
}

// эффект
function glow(){
  deckMaterial.emissive.setHex(0xff00ff);
  setTimeout(()=>deckMaterial.emissive.setHex(0x220022),200);
}

// управление
document.addEventListener("keydown", e=>{
  if(e.code==="Space") jump();
  if(e.code==="KeyQ") tailwhip();
  if(e.code==="KeyE") barspin();
  if(e.code==="KeyR") backflip();
});

// движение
let speed = 0.15;

// цикл
function animate(){
  requestAnimationFrame(animate);

  scooter.position.x += speed;

  velocityY -= 0.015;
  scooter.position.y += velocityY;

  if(scooter.position.y < 0.5){
    scooter.position.y = 0.5;
    velocityY = 0;
    jumping = false;
    combo = 1;
  }

  camera.position.x = scooter.position.x - 4;
  camera.lookAt(scooter.position);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
